/* ---------- PDF ---------- */
function genPDF(kind,order,cfg,action){
  if(!window.jspdf){alert("PDF: librairie non chargée, réessaie.");return;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:"mm",format:"a4"});
  const W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight();
  const ink=[20,18,16], gold=[154,123,79], soft=[140,133,124];
  const title=kind==="facture"?"FACTURE":"BON DE LIVRAISON";
  doc.setTextColor.apply(doc,ink); doc.setFont("helvetica","bold"); doc.setFontSize(30);
  doc.text("ELYNE",20,26);
  doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor.apply(doc,gold);
  doc.text("C O S M E T I C S",20,31);
  doc.setTextColor.apply(doc,soft); doc.setFontSize(8);
  doc.text("Parfums & Beaute de luxe  -  Tunisie",20,37);
  doc.text("WhatsApp: +"+((cfg&&cfg.whatsapp)||"216")+"   -   elynecosimitics.com",20,41);
  doc.setTextColor.apply(doc,ink); doc.setFont("helvetica","bold"); doc.setFontSize(19);
  doc.text(title,W-20,25,{align:"right"});
  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor.apply(doc,soft);
  const num=(kind==="facture"?"FAC-":"BL-")+((order.num)||String(order._id||"").slice(0,6).toUpperCase()||"0001");
  doc.text("N0: "+num,W-20,31,{align:"right"});
  doc.text("Date: "+(order.date||new Date().toLocaleDateString("fr-FR")),W-20,36,{align:"right"});
  doc.setDrawColor.apply(doc,gold); doc.setLineWidth(0.6); doc.line(20,46,W-20,46);
  doc.setTextColor.apply(doc,soft); doc.setFont("helvetica","bold"); doc.setFontSize(8); doc.text("CLIENT",20,56);
  doc.setTextColor.apply(doc,ink); doc.setFont("helvetica","bold"); doc.setFontSize(13); doc.text(order.nom||"Client",20,62);
  doc.setFont("helvetica","normal"); doc.setFontSize(9);
  doc.text("Tel: "+(order.tel||"-"),20,68);
  const addr=((order.adresse||"")+", "+(order.ville||"")+" "+(order.gouvernorat||"")).replace(/^,\s*/,"").trim();
  if(addr) doc.text(addr,20,73);
  doc.setTextColor.apply(doc,soft); doc.setFont("helvetica","bold"); doc.setFontSize(8); doc.text("PAIEMENT",W-20,56,{align:"right"});
  doc.setTextColor.apply(doc,ink); doc.setFont("helvetica","normal"); doc.setFontSize(10); doc.text("Paiement a la livraison",W-20,62,{align:"right"});
  const its=(order.items||[]).map(it=>[it.nom||"",it.marque||"",String(it.qte||1),(Number(it.prix)||0).toFixed(2),((it.qte||1)*(Number(it.prix)||0)).toFixed(2)]);
  const total=order.total!=null?order.total:(order.items||[]).reduce((s,it)=>s+(it.qte||1)*(Number(it.prix)||0),0);
  doc.autoTable({
    startY:82,
    head:[["Designation","Marque","Qte","P.U. (DT)","Total (DT)"]],
    body:its.length?its:[["-","","","",""]],
    foot:[["","","","TOTAL",Number(total).toFixed(2)+" DT"]],
    headStyles:{fillColor:ink,textColor:255,fontStyle:"bold"},
    footStyles:{fillColor:gold,textColor:255,fontStyle:"bold",fontSize:11},
    columnStyles:{2:{halign:"right"},3:{halign:"right"},4:{halign:"right"}},
    styles:{fontSize:9,cellPadding:2.6}, alternateRowStyles:{fillColor:[250,247,243]},
    margin:{left:20,right:20}
  });
  let y=doc.lastAutoTable.finalY+20;
  doc.setDrawColor(231,224,214); doc.setLineWidth(0.5); doc.line(W-70,y,W-20,y);
  doc.setTextColor.apply(doc,soft); doc.setFontSize(8); doc.text("Cachet & Signature",W-20,y+5,{align:"right"});
  doc.setTextColor.apply(doc,soft); doc.setFontSize(8);
  doc.text("Merci pour votre confiance - ELYNE COSMETICS",W/2,H-18,{align:"center"});
  doc.text("Document genere automatiquement - elynecosimitics.com",W/2,H-13,{align:"center"});
  const fname="Elyne-"+kind+"-"+String(order.nom||"client").replace(/\s+/g,"_")+".pdf";
  const blob=doc.output("blob");
  let file=null; try{ file=new File([blob],fname,{type:"application/pdf"}); }catch(e){}
  try{ if(file&&navigator.canShare&&navigator.canShare({files:[file]})){ navigator.share({files:[file],title:fname}).catch(function(){dl();}); return; } }catch(e){}
  dl();
  function dl(){
    const url=URL.createObjectURL(blob);
    if(action==="print"){
      const w=window.open(url,"_blank");
      if(w){ try{w.focus();}catch(e){} } else { lnk(url); }
    } else { lnk(url); }
    setTimeout(function(){URL.revokeObjectURL(url);},4000);
  }
  function lnk(url){ const a=document.createElement("a"); a.href=url; a.download=fname; a.target="_blank"; document.body.appendChild(a); a.click(); setTimeout(function(){a.remove();},500); }
}

/* ---------- IMAGE RESIZE ---------- */
function resizeImg(file,cb){
  const r=new FileReader();
  r.onload=function(){
    const img=new Image();
    img.onload=function(){
      const max=560; let w=img.width,h=img.height;
      if(w>h){ if(w>max){h=Math.round(h*max/w);w=max;} } else { if(h>max){w=Math.round(w*max/h);h=max;} }
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      cb(cv.toDataURL("image/jpeg",0.62));
    };
    img.onerror=function(){cb(null);};
    img.src=r.result;
  };
  r.onerror=function(){cb(null);};
  r.readAsDataURL(file);
}

/* ---------- BILAN ---------- */
function Bilan({orders,products}){
  const valid=orders.filter(o=>o.status!=="Annulée");
  const enc=orders.filter(o=>(o.status||"En cours")==="En cours").length;
  const conf=orders.filter(o=>o.status==="Confirmée").length;
  const liv=orders.filter(o=>o.status==="Livrée").length;
  const ann=orders.filter(o=>o.status==="Annulée").length;
  const ca=valid.reduce((s,o)=>s+(Number(o.total)||0),0);
  const panier=valid.length?Math.round(ca/valid.length):0;
  const low=products.filter(p=>(Number(p.stock)||0)<=10);
  const days=[]; const today=new Date();
  for(let i=6;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);days.push({key:d.toLocaleDateString("fr-FR"),lbl:["D","L","M","M","J","V","S"][d.getDay()],v:0});}
  const idx={}; days.forEach((d,i)=>idx[d.key]=i);
  valid.forEach(o=>{const k=o.date; if(k in idx) days[idx[k]].v+=(Number(o.total)||0);});
  const maxV=Math.max(1,Math.max.apply(null,days.map(d=>d.v)));
  const count={}; orders.forEach(o=>(o.items||[]).forEach(it=>{count[it.nom]=(count[it.nom]||0)+(it.qte||1);}));
  const top=Object.entries(count).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const stRows=[["En cours",enc,C.gold],["Confirmée",conf,C.blue],["Livrée",liv,C.green],["Annulée",ann,C.red]];
  const maxSt=Math.max(1,enc,conf,liv,ann);
  return(
    <div style={{padding:16}}>
      <h2 className="disp" style={{fontSize:24,marginBottom:14}}>Tableau de bord</h2>
      <div className="card" style={{background:"linear-gradient(135deg,#211d18,#46392a)",borderRadius:20,padding:20,color:"#fff",marginBottom:14,boxShadow:"0 8px 24px #14121026"}}>
        <div style={{fontSize:11,color:"#d9c9a8",letterSpacing:1.5}}>CHIFFRE D'AFFAIRES</div>
        <div className="disp" style={{fontSize:34,marginTop:2,color:"#fff"}}>{money(ca)}</div>
        <div style={{display:"flex",gap:22,marginTop:16}}>
          <div><div style={{fontSize:18,fontWeight:600}}>{orders.length}</div><div style={{fontSize:11,color:"#bcae93"}}>Commandes</div></div>
          <div><div style={{fontSize:18,fontWeight:600}}>{money(panier)}</div><div style={{fontSize:11,color:"#bcae93"}}>Panier moyen</div></div>
          <div><div style={{fontSize:18,fontWeight:600,color:"#7fe0a6"}}>{liv}</div><div style={{fontSize:11,color:"#bcae93"}}>Livrées</div></div>
        </div>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:14}}>
        <Stat k="En cours" v={enc} color={C.gold}/>
        <Stat k="Confirmées" v={conf} color={C.blue}/>
        <Stat k="Produits" v={products.length}/>
      </div>
      <div className="card" style={{background:C.card,borderRadius:16,padding:16,marginBottom:14,boxShadow:"0 2px 10px #1412100c"}}>
        <div style={{fontWeight:600,marginBottom:14}}>📈 Ventes — 7 derniers jours</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:8,height:110}}>
          {days.map((d,i)=>(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{fontSize:9,color:C.soft}}>{d.v>0?Math.round(d.v):""}</div>
              <div style={{width:"100%",height:Math.max(4,(d.v/maxV)*78),background:d.v>0?"linear-gradient(180deg,"+C.gold+",#c2a25f)":C.line,borderRadius:6}}></div>
              <div style={{fontSize:10,color:C.soft}}>{d.lbl}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="card" style={{background:C.card,borderRadius:16,padding:16,marginBottom:14,boxShadow:"0 2px 10px #1412100c"}}>
        <div style={{fontWeight:600,marginBottom:12}}>📋 Répartition des commandes</div>
        {stRows.map(([n,v,col])=>(
          <div key={n} style={{display:"flex",alignItems:"center",gap:10,marginBottom:9}}>
            <div style={{width:74,fontSize:12,color:C.soft}}>{n}</div>
            <div style={{flex:1,height:9,background:C.line,borderRadius:9,overflow:"hidden"}}><div style={{width:(v/maxSt*100)+"%",height:"100%",background:col,borderRadius:9}}></div></div>

  );

/* ---------- COMMANDES ---------- */

    <div style={{padding:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h2 className="disp" style={{fontSize:24}}>Stock</h2>
        <button className="tapb" onClick={()=>setAdd(true)} style={{padding:"9px 14px",borderRadius:99,border:"none",background:C.gold,color:"#fff",fontSize:13,fontWeight:600}}>+ Produit</button>
      </div>
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Rechercher un produit…" style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid "+C.line,marginBottom:14,fontSize:14,outline:"none"}}/>
      {list.map(p=>(
        <div key={p.id} className="card" style={{background:C.card,borderRadius:14,padding:14,marginBottom:10,boxShadow:"0 2px 8px #1412100a"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
            <div style={{width:46,height:46,borderRadius:10,overflow:"hidden",flexShrink:0,background:C.cream,display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid "+C.line}}>
              {p.img?<img src={p.img} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:18}}>🧴</span>}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,color:C.soft}}>{p.brand} · {p.cat}</div>
              <div style={{fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</div>
              <div style={{fontSize:13,color:C.gold,marginTop:2}}>{money(p.price)}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <button onClick={()=>setStock(p.id,Math.max(0,(Number(p.stock)||0)-1))} style={stepBtn}>−</button>
              <div style={{width:38,textAlign:"center"}}>
                <div style={{fontWeight:700,fontSize:17,color:(Number(p.stock)||0)<=10?C.red:C.ink}}>{p.stock||0}</div>
                <div style={{fontSize:9,color:C.soft}}>stock</div>
              </div>
              <button onClick={()=>setStock(p.id,(Number(p.stock)||0)+1)} style={stepBtn}>+</button>
              <button onClick={()=>{if(window.confirm("Supprimer "+p.name+" ?"))delProduct(p.id);}} style={{...stepBtn,color:C.red}}>🗑</button>
            </div>
          </div>
        </div>
      ))}
      {add&&<AddProduct onClose={()=>setAdd(false)} save={p=>{saveProduct(p);setAdd(false);}}/>}
    </div>
  );
}
const stepBtn={width:34,height:34,borderRadius:9,border:"1px solid "+C.line,background:"#fff",fontSize:17,lineHeight:"30px"};

function AddProduct({onClose,save}){
  const [f,setF]=useState({brand:"",name:"",cat:"Parfums Femme",price:"",old:"",stock:"",desc:""});
  const [img,setImg]=useState("");
  const set=k=>e=>setF({...f,[k]:e.target.value});
  const cats=["Parfums Femme","Parfums Homme","Maquillage","Soins Visage"];
  const kindFor=c=>c.indexOf("Parfum")>=0?"perfume":c==="Maquillage"?"lipstick":"dropper";
  const onPhoto=e=>{const file=e.target.files&&e.target.files[0]; if(!file)return; resizeImg(file,function(d){ if(d)setImg(d); else alert("Image illisible."); });};
  const ok=()=>{ if(!f.name||!f.price){alert("Nom et prix requis.");return;} save({brand:f.brand||"ELYNE",name:f.name,cat:f.cat,kind:kindFor(f.cat),sch:["#caa07a","#9c7550","#1c1c1c"],price:Number(f.price),old:Number(f.old||f.price),rating:5,reviews:0,stock:Number(f.stock||0),badge:"Nouveau",desc:f.desc||"",img:img||""}); };
  const inp={width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid "+C.line,marginBottom:10,fontSize:14,outline:"none"};
  return(<Sheet onClose={onClose} title="Nouveau produit"><div style={{padding:18}}>
    <label style={{display:"block",marginBottom:12,cursor:"pointer"}}>
      <div style={{width:"100%",height:150,borderRadius:12,border:"1.5px dashed "+C.gold,background:img?"#000":C.cream,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",color:C.gold}}>
        {img?<img src={img} style={{width:"100%",height:"100%",objectFit:"contain"}}/>:<span style={{fontSize:13}}>📷 Ajouter une photo du produit</span>}
      </div>
      <input type="file" accept="image/*" onChange={onPhoto} style={{display:"none"}}/>
    </label>
    <input style={inp} placeholder="Marque (ex: Chanel)" value={f.brand} onChange={set("brand")}/>
    <input style={inp} placeholder="Nom du produit *" value={f.name} onChange={set("name")}/>
    <select style={inp} value={f.cat} onChange={set("cat")}>{cats.map(c=><option key={c}>{c}</option>)}</select>
    <div style={{display:"flex",gap:10}}><input style={inp} type="number" placeholder="Prix (DT) *" value={f.price} onChange={set("price")}/><input style={inp} type="number" placeholder="Ancien prix" value={f.old} onChange={set("old")}/></div>
    <input style={inp} type="number" placeholder="Stock" value={f.stock} onChange={set("stock")}/>
    <textarea style={{...inp,height:70,resize:"none"}} placeholder="Description" value={f.desc} onChange={set("desc")}/>
    <button className="tapb" onClick={ok} style={{width:"100%",padding:14,borderRadius:10,border:"none",background:C.gold,color:"#fff",fontWeight:600,letterSpacing:1}}>Ajouter le produit</button>
  </div></Sheet>);
}

/* ---------- REGLAGES ---------- */
function Reglages({cfg,saveCfg,changePass,logout,install}){
  const [wa,setWa]=useState(cfg.whatsapp||"");
  const [p1,setP1]=useState(""),[p2,setP2]=useState("");
  useEffect(()=>setWa(cfg.whatsapp||""),[cfg.whatsapp]);
  const inp={width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid "+C.line,marginBottom:10,fontSize:14,outline:"none"};
  return(
    <div style={{padding:16}}>
      <h2 className="disp" style={{fontSize:24,marginBottom:14}}>Réglages</h2>
      <Block title="WhatsApp">
        <div style={{fontSize:12,color:C.soft,marginBottom:8}}>Numéro au format 216 + numéro (sans +, ni espaces)</div>
        <input style={inp} value={wa} onChange={e=>setWa(e.target.value)} placeholder="21620123456"/>
        <button className="tapb" onClick={()=>saveCfg({whatsapp:wa})} style={save1}>Enregistrer le numéro</button>
      </Block>
      <Block title="Mot de passe">
        <input style={inp} type="password" value={p1} onChange={e=>setP1(e.target.value)} placeholder="Nouveau mot de passe"/>
        <input style={inp} type="password" value={p2} onChange={e=>setP2(e.target.value)} placeholder="Confirmer"/>
        <button className="tapb" onClick={()=>{if(!p1||p1.length<4){alert("4 caractères minimum.");return;} if(p1!==p2){alert("Les mots de passe ne correspondent pas.");return;} changePass(p1);setP1("");setP2("");}} style={save1}>Changer le mot de passe</button>
      </Block>
      <Block title="Boutique en ligne">
        <a href="https://elynecosimitics.com" target="_blank" style={{...save1,display:"block",textAlign:"center",textDecoration:"none",background:C.ink}}>🌐 Ouvrir le site</a>
      </Block>
      {install&&<button className="tapb" onClick={install} style={{...save1,background:C.green,marginBottom:12}}>📲 Installer l'application</button>}
      <button className="tapb" onClick={logout} style={{...save1,background:"#fff",color:C.red,border:"1px solid "+C.red}}>Se déconnecter</button>
      <div style={{textAlign:"center",color:C.soft,fontSize:11,marginTop:18}}>ELYNE Cosmetics · Gestion v1.1</div>
    </div>
  );
}
const save1={width:"100%",padding:13,borderRadius:10,border:"none",background:C.gold,color:"#fff",fontWeight:600,fontSize:14};
function Block({title,children}){return(<div className="card" style={{background:C.card,borderRadius:16,padding:16,marginBottom:14,boxShadow:"0 2px 10px #1412100c"}}>
  <div style={{fontWeight:600,marginBottom:10}}>{title}</div>{children}</div>);}

/* ---------- SHEET ---------- */
function Sheet({title,onClose,children}){
  return(<div onClick={onClose} style={{position:"fixed",inset:0,background:"#0008",zIndex:100,display:"flex",alignItems:"flex-end"}}>
    <div onClick={e=>e.stopPropagation()} style={{background:C.bg,width:"100%",maxWidth:520,margin:"0 auto",maxHeight:"90vh",borderRadius:"20px 20px 0 0",overflowY:"auto",animation:"pop .25s ease"}}>
      <div style={{position:"sticky",top:0,background:C.bg,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid "+C.line,zIndex:2}}>
        <b>{title}</b><button onClick={onClose} style={{border:"none",background:"none",fontSize:22,color:C.soft}}>×</button>
      </div>{children}
    </div></div>);
}

/* ---------- APP ---------- */
function App(){
  const [tab,setTab]=useState("bilan");
  const [auth,setAuth]=useState(()=>{try{return localStorage.getItem("elyne_auth")==="1";}catch(e){return false;}});
  const [orders,setOrders]=useState([]);
  const [products,setProducts]=useState([]);
  const [cfg,setCfg]=useState({whatsapp:"216126497"});
  const [err,setErr]=useState("");
  const [install,setInstall]=useState(null);

  useEffect(()=>{
    const h=e=>{e.preventDefault();setInstall(()=>()=>{e.prompt();});};
    window.addEventListener("beforeinstallprompt",h);
    if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
    return ()=>window.removeEventListener("beforeinstallprompt",h);
  },[]);
  useEffect(()=>{
    if(!db)return;
    const u1=db.collection("orders").onSnapshot(s=>{const a=s.docs.map(d=>({_id:d.id,...d.data()}));setOrders(a);},e=>setErr(e.message));
    const u2=db.collection("products").onSnapshot(s=>{const a=s.docs.map(d=>d.data());a.sort((x,y)=>(x.id||0)-(y.id||0));setProducts(a);},e=>setErr(e.message));
    const u3=db.collection("config").doc("site").onSnapshot(d=>{if(d.exists)setCfg(c=>({...c,...d.data()}));},e=>{});
    return ()=>{u1();u2();u3();};
  },[]);

  const setStatus=(id,st)=>db&&db.collection("orders").doc(id).set({status:st},{merge:true}).catch(e=>alert("Erreur: "+e.message));
  const delOrder=id=>db&&db.collection("orders").doc(id).delete().catch(e=>alert("Erreur: "+e.message));
  const setStock=(pid,v)=>db&&db.collection("products").doc(String(pid)).set({stock:v},{merge:true}).catch(e=>alert("Erreur: "+e.message));
  const delProduct=pid=>db&&db.collection("products").doc(String(pid)).delete().catch(e=>alert("Erreur: "+e.message));
  const saveProduct=p=>{const id=(products.length?Math.max.apply(null,products.map(x=>x.id||0)):0)+1;db&&db.collection("products").doc(String(id)).set({...p,id}).catch(e=>alert("Erreur: "+e.message));};
  const saveCfg=nc=>db&&db.collection("config").doc("site").set(nc,{merge:true}).then(()=>alert("Enregistré ✓")).catch(e=>alert("Erreur: "+e.message));
  const changePass=p=>db&&db.collection("config").doc("site").set({adminPass:p},{merge:true}).then(()=>alert("Mot de passe changé ✓")).catch(e=>alert("Erreur: "+e.message));

  if(!auth) return <Login pass={cfg.adminPass} onOk={()=>{try{localStorage.setItem("elyne_auth","1");}catch(e){} setAuth(true);}}/>;

  return(
    <div style={{maxWidth:520,margin:"0 auto",minHeight:"100vh",paddingBottom:78}}>
      <div style={{background:C.ink,padding:"16px 16px 14px",position:"sticky",top:0,zIndex:20}}><Logo small/></div>
      {err&&<div style={{background:"#FDECEC",color:C.red,padding:"12px 16px",fontSize:12.5,lineHeight:1.5}}>
        ⚠️ Accès base de données refusé. Active les règles Firestore (read/write) dans la console Firebase. <b>({err})</b></div>}
      {tab==="bilan"&&<Bilan orders={orders} products={products}/>}
      {tab==="cmd"&&<Commandes orders={orders} cfg={cfg} setStatus={setStatus} delOrder={delOrder}/>}
      {tab==="stock"&&<Stock products={products} setStock={setStock} saveProduct={saveProduct} delProduct={delProduct}/>}
      {tab==="set"&&<Reglages cfg={cfg} saveCfg={saveCfg} changePass={changePass} logout={()=>{try{localStorage.removeItem("elyne_auth");}catch(e){} setAuth(false);}} install={install}/>}
      <div style={{position:"fixed",bottom:0,left:0,right:0,maxWidth:520,margin:"0 auto",background:"#fff",borderTop:"1px solid "+C.line,display:"flex",paddingBottom:"env(safe-area-inset-bottom)"}}>
        {[["bilan","Bilan"],["cmd","Commandes"],["stock","Stock"],["set","Réglages"]].map(([k,l])=>
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,border:"none",background:"none",padding:"10px 0 12px",color:tab===k?C.ink:C.soft}}>
            <div style={{fontSize:20,opacity:tab===k?1:.5}}>{ICON[k]}</div>
            <div style={{fontSize:11,marginTop:2,fontWeight:tab===k?600:400}}>{l}</div>
          </button>)}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
